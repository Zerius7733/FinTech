<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Import</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Portfolio Import</h1>

    <label>Backend URL</label>
    <input id="apiBase" type="text" placeholder="http://127.0.0.1:8000" />

    <label>User ID</label>
    <input id="userId" type="text" placeholder="u002" />

    <label>Model</label>
    <input id="model" type="text" placeholder="gpt-4.1-mini" />

    <div class="row">
      <button id="captureBtn">Capture + Parse</button>
      <button id="confirmBtn">Confirm</button>
    </div>

    <p id="status">Idle</p>

    <img id="preview" alt="Screenshot preview" />

    <div class="row between">
      <label>Detected Holdings (edit before confirm)</label>
      <button id="addRowBtn" type="button">+ Add</button>
    </div>

    <div id="holdingsList" class="holdings-list"></div>
    <div id="warningsBox" class="warnings-box"></div>

    <label>Import ID</label>
    <input id="importId" type="text" readonly />
  </main>

  <script src="popup.js"></script>
</body>
</html>
